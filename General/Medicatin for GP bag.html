<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP Emergency Drugs Quick Reference</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 3px solid #3b82f6;
            padding: 16px 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .header h1 {
            font-size: 1.3rem;
            font-weight: 800;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header h1 .icon {
            font-size: 1.5rem;
        }

        .age-toggle {
            display: flex;
            gap: 4px;
            background: #1e293b;
            border-radius: 12px;
            padding: 4px;
            border: 1px solid #334155;
        }

        .age-toggle button {
            padding: 8px 20px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s ease;
            background: transparent;
            color: #94a3b8;
        }

        .age-toggle button.active {
            color: #fff;
        }

        .age-toggle button.adult-btn.active {
            background: #3b82f6;
            box-shadow: 0 2px 10px rgba(59, 130, 246, 0.4);
        }

        .age-toggle button.child-btn.active {
            background: #8b5cf6;
            box-shadow: 0 2px 10px rgba(139, 92, 246, 0.4);
        }

        /* Search */
        .search-container {
            position: relative;
        }

        .search-container input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #fff;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-container input:focus {
            border-color: #3b82f6;
        }

        .search-container .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #64748b;
            font-size: 1rem;
        }

        /* Navigation Pills */
        .nav-pills {
            display: flex;
            gap: 6px;
            padding: 10px 20px;
            overflow-x: auto;
            background: #1e293b;
            border-bottom: 1px solid #334155;
            scrollbar-width: none;
        }

        .nav-pills::-webkit-scrollbar {
            display: none;
        }

        .nav-pill {
            flex-shrink: 0;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #334155;
            background: transparent;
            color: #94a3b8;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .nav-pill:hover, .nav-pill.active {
            background: #3b82f6;
            color: #fff;
            border-color: #3b82f6;
        }

        /* Main Content */
        .main-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
        }

        /* Condition Cards */
        .condition-card {
            background: #1e293b;
            border-radius: 16px;
            margin-bottom: 12px;
            border: 1px solid #334155;
            overflow: hidden;
            transition: all 0.3s;
        }

        .condition-card.highlight {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.15);
        }

        .condition-header {
            padding: 14px 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            user-select: none;
            transition: background 0.2s;
        }

        .condition-header:hover {
            background: #263044;
        }

        .condition-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .condition-emoji {
            font-size: 1.5rem;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            border-radius: 10px;
        }

        .condition-title {
            font-size: 1.05rem;
            font-weight: 700;
            color: #fff;
        }

        .condition-subtitle {
            font-size: 0.75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .chevron {
            font-size: 1.2rem;
            color: #64748b;
            transition: transform 0.3s;
        }

        .condition-card.open .chevron {
            transform: rotate(180deg);
        }

        .condition-body {
            display: none;
            padding: 0 18px 18px;
        }

        .condition-card.open .condition-body {
            display: block;
        }

        /* Drug Items */
        .drug-item {
            background: #0f172a;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 8px;
            border-left: 4px solid #3b82f6;
        }

        .drug-name {
            font-weight: 700;
            color: #60a5fa;
            font-size: 0.95rem;
            margin-bottom: 6px;
        }

        .drug-dose {
            font-size: 1.1rem;
            font-weight: 800;
            color: #fbbf24;
            margin-bottom: 6px;
        }

        .drug-route {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 6px;
            margin-right: 4px;
        }

        .route-im {
            background: #065f46;
            color: #6ee7b7;
        }

        .route-iv {
            background: #7c2d12;
            color: #fdba74;
        }

        .route-oral {
            background: #1e3a5f;
            color: #93c5fd;
        }

        .route-sc {
            background: #4c1d95;
            color: #c4b5fd;
        }

        .route-neb {
            background: #164e63;
            color: #67e8f9;
        }

        .route-inh {
            background: #365314;
            color: #bef264;
        }

        .route-sl {
            background: #713f12;
            color: #fde047;
        }

        .route-buccal {
            background: #581c87;
            color: #d8b4fe;
        }

        .route-rectal {
            background: #5b2139;
            color: #fda4af;
        }

        .drug-instructions {
            font-size: 0.88rem;
            color: #cbd5e1;
            line-height: 1.5;
        }

        /* Warning Boxes */
        .warning {
            background: #450a0a;
            border: 1px solid #dc2626;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 8px;
            margin-bottom: 4px;
            font-size: 0.85rem;
            color: #fca5a5;
            font-weight: 600;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .warning .warning-icon {
            color: #ef4444;
            font-size: 1.1rem;
            flex-shrink: 0;
            margin-top: 1px;
        }

        /* Important info box */
        .info-box {
            background: #172554;
            border: 1px solid #2563eb;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 8px;
            font-size: 0.85rem;
            color: #93c5fd;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }

        .info-box .info-icon {
            color: #3b82f6;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        /* Note box */
        .note-box {
            background: #1a1a0e;
            border: 1px solid #a16207;
            border-radius: 8px;
            padding: 10px 14px;
            margin-top: 8px;
            font-size: 0.82rem;
            color: #fde68a;
        }

        /* Dose Tables */
        .dose-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            border-radius: 8px;
            overflow: hidden;
            font-size: 0.85rem;
        }

        .dose-table th {
            background: #334155;
            color: #f1f5f9;
            padding: 8px 10px;
            text-align: center;
            font-weight: 700;
            font-size: 0.8rem;
        }

        .dose-table td {
            background: #1e293b;
            color: #fbbf24;
            padding: 8px 10px;
            text-align: center;
            font-weight: 700;
            border-top: 1px solid #334155;
            font-size: 0.9rem;
        }

        .dose-table tr:hover td {
            background: #263044;
        }

        /* Diluent badge */
        .diluent-badge {
            display: inline-block;
            background: #1e3a5f;
            color: #93c5fd;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            margin-top: 4px;
        }

        /* Section divider inside cards */
        .section-divider {
            height: 1px;
            background: #334155;
            margin: 12px 0;
        }

        /* Bold highlight text */
        .bold-dose {
            color: #fbbf24;
            font-weight: 800;
        }

        .bold-white {
            color: #fff;
            font-weight: 700;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header h1 {
                font-size: 1.1rem;
            }

            .age-toggle button {
                padding: 6px 14px;
                font-size: 0.8rem;
            }

            .condition-title {
                font-size: 0.95rem;
            }

            .drug-dose {
                font-size: 1rem;
            }

            .dose-table th, .dose-table td {
                padding: 6px 5px;
                font-size: 0.75rem;
            }
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Diluent card */
        .diluent-card {
            background: linear-gradient(135deg, #172554, #1e293b);
            border: 1px solid #2563eb;
            border-radius: 12px;
            padding: 14px 18px;
            margin-bottom: 12px;
        }

        .diluent-card h3 {
            color: #60a5fa;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .diluent-card p {
            font-size: 0.85rem;
            color: #94a3b8;
        }

        .diluent-card .items {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .diluent-card .items span {
            background: #0f172a;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 0.82rem;
            color: #93c5fd;
            font-weight: 600;
        }

        /* General note at bottom */
        .general-note {
            background: #1e293b;
            border: 1px solid #a16207;
            border-radius: 12px;
            padding: 16px;
            margin: 20px 0;
            font-size: 0.82rem;
            color: #fde68a;
            line-height: 1.6;
        }

        .general-note strong {
            color: #fbbf24;
        }

        /* Scroll to top */
        .scroll-top {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: #3b82f6;
            color: #fff;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
            z-index: 50;
            transition: transform 0.2s;
        }

        .scroll-top:hover {
            transform: scale(1.1);
        }

        .scroll-top.visible {
            display: flex;
        }

        /* No results */
        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-top">
            <h1><span class="icon">🚑</span> GP Emergency Drugs</h1>
            <div class="age-toggle">
                <button class="adult-btn active" onclick="switchTab('adult')">👤 Adults</button>
                <button class="child-btn" onclick="switchTab('child')">👶 Children</button>
            </div>
        </div>
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" placeholder="Search condition or drug..." oninput="filterCards()">
        </div>
    </div>

    <!-- NAV PILLS -->
    <div class="nav-pills" id="navPills">
        <!-- Populated by JS -->
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content" id="mainContent">
        <!-- Populated by JS -->
    </div>

    <!-- Scroll to top -->
    <button class="scroll-top" id="scrollTopBtn" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <script>
        // ========== DATA ==========
        const data = {
            adult: [
                {
                    id: 'diluents',
                    title: 'Diluents',
                    emoji: '💧',
                    subtitle: 'Preparation essentials',
                    type: 'diluent',
                    content: {
                        note: 'Most drugs come as solutions. Where they don\'t, the diluent is specified.',
                        items: ['Water for Injection', 'Sodium Chloride 0.9% for Injection']
                    }
                },
                {
                    id: 'acs',
                    title: 'Acute Coronary Syndrome',
                    emoji: '❤️',
                    subtitle: 'Chest pain / heart attack',
                    drugs: [
                        {
                            name: 'Aspirin 300mg tablets',
                            dose: '300mg',
                            routes: [{label: 'ORAL', class: 'route-oral'}],
                            instructions: 'Give as a single dose.',
                            warning: 'Do NOT give if known allergy to aspirin.'
                        },
                        {
                            name: 'GTN 400mcg sublingual spray',
                            dose: '1–2 puffs every 3–5 min',
                            routes: [{label: 'SUBLINGUAL', class: 'route-sl'}],
                            instructions: 'Maximum 3 doses in 15 minutes. If pain persists, consider opioid analgesia with antiemetic cover.'
                        }
                    ]
                },
                {
                    id: 'anaphylaxis',
                    title: 'Anaphylaxis',
                    emoji: '⚠️',
                    subtitle: 'Severe allergic reaction – LIFE THREATENING',
                    drugs: [
                        {
                            name: 'Adrenaline 1 in 1000 (1mg/ml)',
                            dose: '0.5mg (500mcg)',
                            routes: [{label: 'IM', class: 'route-im'}],
                            instructions: 'Use ampoule or pre-filled 500mcg pen (e.g. Mini-Jet). Monitor BP, pulse, O₂ sats, ECG.',
                            warning: 'Do NOT give adrenaline intravenously in anaphylaxis. Do NOT use Epipen (only contains 300mcg).',
                            info: 'If any asthma-like symptoms present, treat as per acute asthma as well.'
                        },
                        {
                            name: 'Chlorphenamine 10mg/ml (= chlorpheniramine)',
                            dose: '10mg',
                            routes: [{label: 'IM', class: 'route-im'}, {label: 'SLOW IV over 1 min', class: 'route-iv'}],
                            instructions: 'Can be given after initial resuscitation.',
                            diluent: 'Sodium Chloride 0.9%'
                        },
                        {
                            name: 'Hydrocortisone 100mg for injection',
                            dose: '200mg (2 ampoules)',
                            routes: [{label: 'IM', class: 'route-im'}, {label: 'SLOW IV', class: 'route-iv'}],
                            instructions: 'Can be given after initial resuscitation. Efcortesol is pre-mixed and ready to use.'
                        }
                    ]
                },
                {
                    id: 'asthma',
                    title: 'Asthma (Acute)',
                    emoji: '🫁',
                    subtitle: 'Acute exacerbation',
                    drugs: [
                        {
                            name: 'Salbutamol pMDI inhaler + large volume spacer',
                            dose: '4 puffs then 2 puffs every 2 min (max 10 puffs)',
                            routes: [{label: 'INHALER', class: 'route-inh'}],
                            instructions: 'Can be repeated 10–20 min later if needed. 5 gentle tidal breaths per puff. Shake inhaler before each puff.'
                        },
                        {
                            name: 'Salbutamol nebules',
                            dose: '2.5–5mg',
                            routes: [{label: 'NEBULISER', class: 'route-neb'}],
                            instructions: 'Alternative to inhaler. Ideally drive nebuliser with oxygen.',
                            info: 'If severe/life-threatening asthma: consider continuous nebulised salbutamol.'
                        },
                        {
                            name: 'Ipratropium nebules',
                            dose: '500mcg (0.5mg)',
                            routes: [{label: 'NEBULISER', class: 'route-neb'}],
                            instructions: 'Use combined with nebulised salbutamol if poor response to initial salbutamol dose or if life-threatening asthma.'
                        },
                        {
                            name: 'Oxygen',
                            dose: 'High-flow',
                            routes: [{label: 'INHALED', class: 'route-inh'}],
                            instructions: 'Via close-fitting face mask or nasal cannula. Give if sats <94%. Target sats 94–98%.'
                        },
                        {
                            name: 'Prednisolone 5mg tablets',
                            dose: '40–50mg',
                            routes: [{label: 'ORAL', class: 'route-oral'}],
                            instructions: 'Alternative: Hydrocortisone 100mg IV (Efcortesol is pre-mixed).'
                        }
                    ]
                },
                {
                    id: 'hypoglycaemia',
                    title: 'Hypoglycaemia',
                    emoji: '🩸',
                    subtitle: 'Low blood sugar',
                    drugs: [
                        {
                            name: 'Quick-acting carbohydrate (e.g. Glucogel)',
                            dose: '1 tube',
                            routes: [{label: 'ORAL', class: 'route-oral'}],
                            instructions: 'After treatment, if not admitted: give oral carbohydrate (e.g. toast ± jam) on recovery. Ensure responsible adult present to watch for relapse.'
                        },
                        {
                            name: 'Glucagon for injection',
                            dose: '1mg',
                            routes: [{label: 'IM', class: 'route-im'}, {label: 'SC', class: 'route-sc'}],
                            instructions: 'Use if impaired consciousness or unable to take oral glucose.'
                        },
                        {
                            name: 'Glucose 20% 50ml for injection',
                            dose: '50ml of 20%',
                            routes: [{label: 'IV', class: 'route-iv'}],
                            instructions: 'If no response to glucagon after 10 min. Give into a large bore vein.',
                            warning: 'Very irritant to veins.'
                        }
                    ]
                },
                {
                    id: 'hypo-adrenalism',
                    title: 'Hypo-adrenalism (Adrenal Crisis)',

                    drugs: [
                        {
                            name: 'Hydrocortisone 100mg for injection',
                            dose: '100mg',
                            routes: [{label: 'IM', class: 'route-im'}, {label: 'SLOW IV', class: 'route-iv'}],
                            instructions: 'Presents with vomiting, hypotension and shock in someone who has abruptly stopped oral steroids (especially if unwell with intercurrent illness). Efcortesol is pre-mixed.'
                        }
                    ]
                },
                {
                    id: 'pulmonary-oedema',
                    title: 'Pulmonary Oedema',
                    emoji: '💨',
                    subtitle: 'Acute heart failure',
                    drugs: [
                        {
                            name: 'Furosemide 10mg/ml',
                            dose: '40mg',
                            routes: [{label: 'IV over 10 min', class: 'route-iv'}],
                            instructions: 'Relieve cardiac pain if present (sublingual nitrates, opioids). Alternative: oral furosemide 40mg.'
                        }
                    ]
                },
                {
                    id: 'meningitis',
                    title: 'Bacterial Meningitis / Meningococcal Disease',
                    emoji: '🧠',
                    subtitle: 'Suspected meningitis/sepsis',
                    drugs: [
                        {
                            name: 'Ceftriaxone 2g for injection',
                            dose: '2g',
                            routes: [{label: 'IV INFUSION (preferred)', class: 'route-iv'}, {label: 'IV INJECTION', class: 'route-iv'}, {label: 'DEEP IM', class: 'route-im'}],

                            info: 'For strongly suspected meningococcal disease, or bacterial meningitis if significant delay in transfer expected.'

                        {
                            name: 'Benzylpenicillin 600mg for injection',
                            dose: 'See instructions',
                            routes: [{label: 'IV', class: 'route-iv'}, {label: 'SLOW IM', class: 'route-im'}],
                            instructions: 'Ceftriaxone preferred if available. If IM: give as proximally as possible to warm area (e.g. deltoid).<br><strong>For IM:</strong> use Water for Injection – 600mg in 1.6–2.0ml.<br><strong>For IV:</strong> use Water for Injection – ≥4ml for 600mg, ≥8ml for 1200mg.',
                            warning: 'Risk of sodium overload in renal/heart failure if diluted in 0.9% NaCl.',
                            diluent: 'Water for Injection'
                        }
                    ]
                },
                {
                    id: 'nausea',
                    title: 'Nausea & Vomiting',
                    emoji: '🤢',
                    subtitle: 'Anti-emetics',
                    drugs: [
                        {
                            name: 'Cyclizine 50mg/ml',
                            dose: '50mg',
                            routes: [{label: 'IV', class: 'route-iv'}, {label: 'IM', class: 'route-im'}],
                            instructions: '',
                            warning: 'Not recommended in acute coronary syndrome (causes peripheral vasoconstriction). Not recommended in heart failure.'
                        },
                        {
                            name: 'Metoclopramide 5mg/ml',
                            dose: '10mg',
                            routes: [{label: 'IM', class: 'route-im'}, {label: 'SLOW IV over 3 min', class: 'route-iv'}],
                            instructions: '',
                            warning: 'Can cause oculogyric crisis, especially in young and elderly. Reverse with procyclidine.'
                        },
                        {
                            name: 'Prochlorperazine 12.5mg/ml',
                            dose: '12.5mg',
                            routes: [{label: 'DEEP IM', class: 'route-im'}],
                            instructions: '',
                            warning: 'Can cause oculogyric crisis, especially in young and elderly. Reverse with procyclidine.'
                        },
                        {
                            name: 'Procyclidine 5mg/ml (for oculogyric crisis)',
                            dose: '5–10mg',
                            routes: [{label: 'IV', class: 'route-iv'}, {label: 'IM', class: 'route-im'}],
                            instructions: 'To reverse oculogyric crisis (sustained upward deviation of eyes) triggered by metoclopramide or prochlorperazine. Usually works in 5–10 min, may take up to 30 min.',
                            info: 'This is NOT an antiemetic – it reverses antiemetic side effects.'
                        }
                    ]
                },
                {
                    id: 'opioid-od',
                    title: 'Opioid Overdose',
                    emoji: '💊',
                    subtitle: 'Opioid toxicity reversal',
                    drugs: [
                        {
                            name: 'Naloxone 400mcg/ml',
                            dose: '400–2000mcg',
                            routes: [{label: 'IV (best)', class: 'route-iv'}, {label: 'SC', class: 'route-sc'}, {label: 'IM', class: 'route-im'}],
                            instructions: 'Repeat every 2–3 min to max 10mg. Most patients only need 400–800mcg (1–2 ampoules). SC/IM routes have slower response.'
                        }
                    ]
                },
                {
                    id: 'pain',
                    title: 'Pain',
                    emoji: '💉',
                    subtitle: 'Analgesia',
                    drugs: [
                        {
                            name: 'Paracetamol, Ibuprofen, Codeine',

                            routes: [{label: 'ORAL', class: 'route-oral'}],
                            instructions: 'For mild to moderate pain.'
                        },

        // ========== STATE ==========
        let currentTab = 'adult';
        let openCards = new Set();

        // ========== FUNCTIONS ==========
        function switchTab(tab) {
            currentTab = tab;
            openCards.clear();

            // Toggle button styles
            document.querySelector('.adult-btn').classList.toggle('active', tab === 'adult');
            document.querySelector('.child-btn').classList.toggle('active', tab === 'child');

            // Clear search
            document.getElementById('searchInput').value = '';

            renderNavPills();
            renderCards();
        }

        function renderNavPills() {
            const container = document.getElementById('navPills');
            const items = data[currentTab];
            container.innerHTML = items
                .filter(item => item.type !== 'diluent')
                .map(item => `<button class="nav-pill" onclick="scrollToCard('${item.id}')">${item.emoji} ${item.title}</button>`)
                .join('');
        }

        function renderCards() {
            const container = document.getElementById('mainContent');
            const items = data[currentTab];
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let html = '';

            const filteredItems = items.filter(item => {
                if (!searchTerm) return true;
                const searchableText = JSON.stringify(item).toLowerCase();
                return searchableText.includes(searchTerm);
            });

            if (filteredItems.length === 0) {
                html = '<div class="no-results">No matching conditions or drugs found.</div>';
                container.innerHTML = html;
                return;
            }

            filteredItems.forEach(item => {
                if (item.type === 'diluent') {
                    html += renderDiluentCard(item);
                } else {
                    html += renderConditionCard(item, !!searchTerm);
                }
            });

            // Add general note
            if (!searchTerm) {
                html += `
                    <div class="general-note">
                        <strong>*NOTE – Hydrocortisone for injection:</strong> Two forms exist – both can be used for all indications listed. 
                        <strong>Solu-cortef</strong> (hydrocortisone sodium succinate) is a powder requiring mixing with water. 
                        <strong>Efcortesol</strong> (hydrocortisone sodium phosphate) comes in solution ready to use. 
                        <em>It is sensible to carry the pre-mixed Efcortesol in an emergency bag.</em>
                        <br><br><span style="color:#fca5a5;">⚠️ IV administration can cause paraesthesia and pain, often perianally.</span>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        function renderDiluentCard(item) {
            return `
                <div class="diluent-card" id="card-${item.id}">
                    <h3>💧 ${item.title}</h3>
                    <p>${item.content.note}</p>
                    <div class="items">
                        ${item.content.items.map(i => `<span>${i}</span>`).join('')}
                    </div>
                </div>
            `;
        }

        function renderConditionCard(item, forceOpen) {
            const isOpen = forceOpen || openCards.has(item.id);
            return `
                <div class="condition-card ${isOpen ? 'open' : ''} ${forceOpen ? 'highlight' : ''}" id="card-${item.id}">
                    <div class="condition-header" onclick="toggleCard('${item.id}')">
                        <div class="condition-header-left">
                            <div class="condition-emoji">${item.emoji}</div>
                            <div>
                                <div class="condition-title">${item.title}</div>
                                <div class="condition-subtitle">${item.subtitle}</div>
                            </div>
                        </div>
                        <span class="chevron">▼</span>
                    </div>
                    <div class="condition-body">
                        ${item.drugs.map((drug, i) => renderDrug(drug, i < item.drugs.length - 1)).join('')}
                    </div>
                </div>
            `;
        }

        function renderDrug(drug, showDivider) {
            let html = `<div class="drug-item">`;
            html += `<div class="drug-name">${drug.name}</div>`;
            html += `<div class="drug-dose">${drug.dose}</div>`;

            if (drug.routes) {
                html += `<div>`;
                drug.routes.forEach(r => {
                    html += `<span class="drug-route ${r.class}">${r.label}</span>`;
                });
                html += `</div>`;
            }

            if (drug.instructions) {
                html += `<div class="drug-instructions">${drug.instructions}</div>`;
            }

            if (drug.warning) {
                html += `<div class="warning"><span class="warning-icon">⛔</span><span>${drug.warning}</span></div>`;
            }

            if (drug.info) {
                html += `<div class="info-box"><span class="info-icon">ℹ️</span><span>${drug.info}</span></div>`;
            }

            if (drug.diluent) {
                html += `<div style="margin-top:6px;"><span class="diluent-badge">💧 Diluent: ${drug.diluent}</span></div>`;
            }

            if (drug.table) {
                html += `<table class="dose-table"><thead><tr>`;
                drug.table.headers.forEach(h => {
                    html += `<th>${h}</th>`;
                });
                html += `</tr></thead><tbody>`;
                drug.table.rows.forEach(row => {
                    html += `<tr>`;
                    row.forEach(cell => {
                        html += `<td>${cell}</td>`;
                    });
                    html += `</tr>`;
                });
                html += `</tbody></table>`;
                if (drug.tableNote) {
                    html += `<div class="note-box">${drug.tableNote}</div>`;
                }
            }

            html += `</div>`;
            return html;
        }

        function toggleCard(id) {
            if (openCards.has(id)) {
                openCards.delete(id);
            } else {
                openCards.add(id);
            }
            const card = document.getElementById('card-' + id);
            if (card) {
                card.classList.toggle('open');
            }
        }

        function scrollToCard(id) {
            // Open the card first
            if (!openCards.has(id)) {
                openCards.add(id);
                const card = document.getElementById('card-' + id);
                if (card) card.classList.add('open');
            }
            const el = document.getElementById('card-' + id);
            if (el) {
                el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                el.classList.add('highlight');
                setTimeout(() => el.classList.remove('highlight'), 2000);
            }
        }

        function filterCards() {
            renderCards();
        }

        // Scroll-to-top button visibility
        window.addEventListener('scroll', () => {
            const btn = document.getElementById('scrollTopBtn');
            btn.classList.toggle('visible', window.scrollY > 300);
        });

        // ========== INIT ==========
        renderNavPills();
        renderCards();
    </script>
