<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GP Emergency Bag - Clinical Reference</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-alt: #f1f5f9;
            --accent: #0ea5e9;
            --accent-light: #e0f2fe;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --red: #dc2626;
            --red-light: #fef2f2;
            --green: #16a34a;
            --orange: #f97316;
            --yellow: #facc15;
            --border: #e2e8f0;
            --shadow: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.03);
            --shadow-lg: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -2px rgba(0,0,0,0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-primary);
            line-height: 1.5;
            min-height: 100vh;
        }

        .container {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .logo-text {
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--text-primary);
        }

        .logo-subtitle {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: -2px;
        }

        .patient-section {
            margin-bottom: 1.5rem;
        }

        .section-label {
            font-size: 0.65rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            padding-left: 0.5rem;
        }

        .nav-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
            margin-bottom: 1.5rem;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.75rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s ease;
            font-size: 0.875rem;
            color: var(--text-secondary);
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--surface-alt);
            color: var(--text-primary);
        }

        .nav-item.active {
            background: var(--accent-light);
            color: var(--accent);
            font-weight: 500;
        }

        .nav-item .icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .alert-badge {
            margin-left: auto;
            background: var(--red);
            color: white;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 20px;
            text-align: center;
        }

        .nav-divider {
            height: 1px;
            background: var(--border);
            margin: 0.75rem 0;
        }

        /* Main Content */
        .main {
            padding: 2rem 2.5rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 2rem;
        }

        .header-title {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .header-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            max-width: 500px;
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 0.625rem 1rem 0.625rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.875rem;
            font-family: inherit;
            background: var(--surface);
            transition: all 0.2s ease;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
        }

        .search-box .icon {
            position: absolute;
            left: 0.875rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
        }

        /* Drug Cards */
        .drug-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }

        .drug-card {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }

        .drug-card:hover {
            box-shadow: var(--shadow-lg);
            transform: translateY(-2px);
        }

        .drug-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            background: linear-gradient(to bottom, var(--surface) 0%, var(--surface-alt) 100%);
        }

        .drug-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .drug-form {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'IBM Plex Mono', monospace;
            background: var(--surface-alt);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .priority-badge {
            font-size: 0.65rem;
            font-weight: 600;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }

        .priority-high {
            background: var(--red-light);
            color: var(--red);
        }

        .priority-medium {
            background: #fff7ed;
            color: var(--orange);
        }

        .priority-low {
            background: #f0fdf4;
            color: var(--green);
        }

        .drug-body {
            padding: 1.25rem 1.5rem;
        }

        .drug-instruction {
            font-size: 0.9375rem;
            color: var(--text-primary);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .drug-critical {
            color: var(--red);
            font-weight: 500;
        }

        .drug-alert {
            background: var(--red-light);
            border-left: 3px solid var(--red);
            padding: 0.75rem 1rem;
            border-radius: 0 6px 6px 0;
            margin-top: 1rem;
            font-size: 0.8125rem;
            color: var(--red);
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
        }

        .drug-alert .icon {
            flex-shrink: 0;
            margin-top: 2px;
        }

        .drug-footer {
            padding: 1rem 1.5rem;
            background: var(--surface-alt);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .drug-footer-item {
            display: flex;
            align-items: center;
            gap: 0.375rem;
        }

        /* Tables */
        .dose-table {
            width: 100%;
            margin-top: 1rem;
            font-size: 0.8125rem;
            border-collapse: collapse;
        }

        .dose-table th {
            text-align: left;
            padding: 0.5rem 0.75rem;
            background: var(--surface-alt);
            font-weight: 500;
            color: var(--text-secondary);
            border-bottom: 1px solid var(--border);
        }

        .dose-table td {
            padding: 0.5rem 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        .dose-table tr:last-child td {
            border-bottom: none;
        }

        .dose-table .critical-dose {
            color: var(--red);
            font-weight: 500;
        }

        /* Utilities */
        .text-red {
            color: var(--red);
        }

        .text-muted {
            color: var(--text-muted);
        }

        .text-small {
            font-size: 0.8125rem;
        }

        .mt-2 { margin-top: 0.5rem; }
        .mt-4 { margin-top: 1rem; }
        .mb-2 { margin-bottom: 0.5rem; }
        .mb-4 { margin-bottom: 1rem; }

        /* Responsive */
        @media (max-width: 1024px) {
            .container {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                display: none;
            }
            
            .main {
                padding: 1.5rem;
            }
            
            .header {
                flex-direction: column;
                gap: 1rem;
            }
            
            .search-box {
                width: 100%;
            }
            
            .drug-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

                            headers: ["Age", "Dose"],
                            rows: [
                                ["<6 months", "25mg"],
                                ["6 months - 6 years", "50mg"],
                                ["6 - 12 years", "100mg"],
                                ["≥12 years", "200mg"]
                            ]
                        },
                        critical: null
                    }
                ],
                "Asthma": [
                    {
                        name: "Salbutamol pMDI + spacer",
                        form: "Inhaler with spacer (+ mask if <3y)",
                        priority: "medium",
                        instruction: "2–10 puffs, one at a time. 5 gentle tidal breaths/puff. Shake before each puff.",
                        note: null,
                        critical: null
                    },
                    {
                        name: "Prednisolone soluble tablets",
                        form: "Oral",
                        priority: "medium",
                        instruction: "Give 1–2mg/kg single stat dose.",
                        note: "Alternative: dexamethasone oral solution (150mcg/kg single dose) but less portable.",
                        critical: null
                    },
                    {
                        name: "Oxygen",
                        form: "High-flow via mask/nasal cannula",
                        priority: "high",
                        instruction: "Give if saturations <94%. Increase to keep sats 94–98%.",
                        note: null,
                        critical: "Target sats 94-98%"
                    },
                    {
                        name: "Salbutamol nebulised via oxygen",
                        form: "Nebuliser solution",
                        priority: "medium",
                        instruction: "Nebulise through oxygen (risk of hypoxia without).",
                        table: {
                            headers: ["Age", "Dose"],
                            rows: [
                                ["2-5 years", "2.5mg"],
                                ["Over 5 years", "5mg"]
                            ]
                        },
                        critical: null
                    },
                    {
                        name: "Nebulised ipratropium",
                        form: "Nebuliser solution",
                        priority: "medium",
                        instruction: "Combine with salbutamol if poor response or life-threatening asthma.",
                        table: {
                            headers: ["Age", "Dose"],
                            rows: [
                                ["2-5 years", "250mcg"],
                                ["Over 5 years", "250mcg"]
                            ]
                        },
                        critical: null
                    },
                    {
                        name: "Hydrocortisone IV",
                        form: "100mg for injection",
                        priority: "medium",
                        instruction: "Alternative to oral prednisolone.",
                        table: {
                            headers: ["Age", "Dose"],
                            rows: [
                                ["2-5 years", "50mg"],
                                ["Over 5 years", "100mg"]
                            ]
                        },
                        critical: null
                    }
                ],
                "Hypoglycaemia": [
                    {
                        name: "Quick-acting carbohydrate",
                        form: "Glucogel/dextrogel tube",
                        priority: "medium",
                        instruction: "Give one tube. Follow with oral carbohydrate when recovered.",
                        note: "Ensure patient left with responsible adult.",
                        critical: null
                    },
                    {
                        name: "Glucagon for injection",
                        form: "Injection",
                        priority: "medium",
                        instruction: "Give by IM or SC injection if impaired consciousness or unable to take oral glucose.",
                        table: {
                            headers: ["Age/Weight", "Dose"],
                            rows: [
                                ["<8 years or <25kg", "0.5mg/500mcg"],
                                ["≥8 years or ≥25kg", "1mg (adult dose)"]
                            ]
                        },
                        critical: null
                    }
                ],
                "Bacterial Meningitis": [
                    {
                        name: "Ceftriaxone",
                        form: "2g for injection",
                        priority: "high",
                        instruction: "For strongly suspected meningococcal disease or bacterial meningitis with transfer delay.",
                        note: "IM: may mix with 1% lidocaine. Doses >1g divided between sites. IV infusion preferred for <50kg. Always check BNFc doses.",
                        table: {
                            headers: ["Age/Weight", "Dose"],
                            rows: [
                                ["Neonate <15 days (IV only)", "50mg/kg"],
                                ["15 days to <12 years but <50kg", "80–100mg/kg"],
                                ["≥9 years and ≥50kg", "2g (adult dose)"]
                            ]
                        },
                        critical: "Always check BNFc for current paediatric dosing"
                    },
                    {
                        name: "Benzylpenicillin",
                        form: "600mg for injection",
                        priority: "high",
                        instruction: "Give by IV or slow IM injection. For suspected meningococcal disease WITH RASH.",
                        note: "NICE: don't give for meningitis without rash unless transfer delay. IM: use WATER FOR INJECTION. IV: use WATER FOR INJECTION (≥4ml for 600mg, ≥8ml for 1200mg).",
                        table: {
                            headers: ["Age", "Dose"],
                            rows: [
                                ["<1 year", "300mg"],
                                ["1–9 years", "600mg (1 ampoule)"],
                                ["≥10 years", "1200mg (2 ampoules)"]
                            ]
                        },
                        critical: "Only if RASH present (NICE). Use WATER not NaCl for IV."
                    }
                ],
                "Dehydration": [
                    {
                        name: "Oral rehydration salts",
                        form: "Oral solution",
                        priority: "low",
                        instruction: "Age 1m–1y: 1–1.5× usual feed volume after each loose stool (hard if breastfed). Age 1–12y: 200ml after each loose stool.",
                        note: null,
                        critical: null
                    }
                ],
                "Opioid Poisoning": [
                    {
                        name: "Naloxone 400mcg/ml",
                        form: "For injection",
                        priority: "high",
                        instruction: "Best given IV. May give SC/IM but slower. Doses from BNFc for poisoning.",
                        table: {
                            headers: ["Age", "Dose"],
                            rows: [
                                ["1 month - 12 years", "100mcg/kg (max 2mg). Repeat at 1min intervals if no response (max total 2mg)."],
                                ["12-18 years", "400mcg. If no response: 800mcg after 1min, further 800mcg after another minute. 2mg if still no response (4mg may be needed)."]
                            ]
                        },
                        critical: "Best given IV. May need repeated doses."
                    }
                ],
                "Pain": [
                    {
                        name: "Paracetamol",
                        form: "Oral, rectal",
                        priority: "low",
                        instruction: "Up to 3m: every 8h. After 3m: 4-6 hourly, max 4 doses/24h.",
                        table: {
                            headers: ["Age", "Dose"],
                            rows: [
                                ["1-3 months", "30-60mg every 8h (max 60mg/kg/day)"],
                                ["3 months - 1 year", "60-125mg 4× daily"],
                                ["1-5 years", "125-250mg 4× daily"],
                                ["12-18 years", "500mg 4× daily"]
                            ]
                        },
                        critical: null
                    },
                    {
                        name: "Ibuprofen liquid",
                        form: "Oral",
                        priority: "low",
                        instruction: "For pain/fever.",
                        table: {
                            headers: ["Age", "Dose"],
                            rows: [
                                ["3-6 months", "50mg 3× daily"],
                                ["6-12 months", "50mg 3-4× daily"],
                                ["1-4 years", "100mg 3× daily"],
                                ["4-7 years", "150mg 3× daily"],
                                ["7-10 years", "200mg 3× daily"],
                                ["10-12 years", "300mg 3× daily"]
                            ]
                        },
                        critical: null
                    }
                ],
                "Seizures": [
                    {
                        name: "Buccal midazolam",
                        form: "Oromucosal solution",
                        priority: "medium",
                        instruction: "Preferred first line. May repeat once after 10min if needed.",
                        table: {
                            headers: ["Age", "Dose"],
                            rows: [
                                ["1-3 months", "0.3mg/kg (max 2.5mg)"],
                                ["3-12 months", "2.5mg"],
                                ["1-5 years", "5mg"],
                                ["5-10 years", "7.5mg"],
                                ["10-18 years", "10mg"]
                            ]
                        },
                        critical: null
                    },
                    {
                        name: "Rectal diazepam",
                        form: "Rectal solution",
                        priority: "medium",
                        instruction: "Alternative to buccal midazolam. May repeat once after 10min if needed.",
                        table: {
                            headers: ["Age", "Dose"],
                            rows: [
                                ["1 month - 2 years", "5mg"],
                                ["2-12 years", "5-10mg"],
                                ["12-18 years", "10-20mg"]
                            ]
                        },
                        critical: null
                    }
                ]
            }
        };

        // State
        let currentGroup = 'adults';
        let currentCategory = null;
        let currentFilter = null;

        // DOM elements
        const drugGrid = document.getElementById('drugGrid');
        const categoryNav = document.getElementById('categoryNav');
        const mainTitle = document.getElementById('mainTitle');
        const mainSubtitle = document.getElementById('mainSubtitle');
        const searchInput = document.getElementById('searchInput');

        // Initialize
        function init() {
            renderCategories();
            renderDrugs();
            setupEventListeners();
        }

        // Render categories in sidebar
        function renderCategories() {
            const categories = Object.keys(drugData[currentGroup]);
            categoryNav.innerHTML = '';

            categories.forEach(category => {
                const button = document.createElement('button');
                button.className = `nav-item ${currentCategory === category ? 'active' : ''}`;
                button.innerHTML = `<span class="icon">📋</span><span>${category}</span>`;
                button.addEventListener('click', () => {
                    currentCategory = category;
                    currentFilter = null;
                    renderCategories();
                    renderDrugs();
                });
                categoryNav.appendChild(button);
            });
        }

        // Render drug cards
        function renderDrugs() {
            drugGrid.innerHTML = '';

            let drugsToShow = [];

            if (currentCategory) {
                drugsToShow = drugData[currentGroup][currentCategory] || [];
            } else if (currentFilter) {
                // Apply filter
                const allCategories = Object.keys(drugData[currentGroup]);
                allCategories.forEach(cat => {
                    drugData[currentGroup][cat].forEach(drug => {
                        if (currentFilter === 'critical' && drug.priority === 'high') {
                            drugsToShow.push({...drug, category: cat});
                        } else if (currentFilter === 'iv' && (drug.form.toLowerCase().includes('injection') || 
                                                           drug.form.toLowerCase().includes('iv') ||
                                                           drug.form.toLowerCase().includes('im'))) {
                            drugsToShow.push({...drug, category: cat});
                        } else if (currentFilter === 'controlled' && drug.name.toLowerCase().includes('diamorphine')) {
                            drugsToShow.push({...drug, category: cat});
                        }
                    });
                });
            } else {
                // Show all
                const allCategories = Object.keys(drugData[currentGroup]);
                allCategories.forEach(cat => {
                    drugData[currentGroup][cat].forEach(drug => {
                        drugsToShow.push({...drug, category: cat});
                    });
                });
            }

            // Apply search filter
            const searchTerm = searchInput.value.toLowerCase();
            if (searchTerm) {
                drugsToShow = drugsToShow.filter(drug => 
                    drug.name.toLowerCase().includes(searchTerm) ||
                    drug.instruction.toLowerCase().includes(searchTerm) ||
                    (drug.note && drug.note.toLowerCase().includes(searchTerm))
                );
            }

            if (drugsToShow.length === 0) {
                drugGrid.innerHTML = '<div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--text-muted);">No drugs found matching your criteria</div>';
                return;
            }

            drugsToShow.forEach(drug => {
                const card = createDrugCard(drug);
                drugGrid.appendChild(card);
            });
        }

        // Create a drug card element
        function createDrugCard(drug) {
            const card = document.createElement('div');
            card.className = 'drug-card';

            let priorityClass = 'priority-low';
            if (drug.priority === 'high') priorityClass = 'priority-high';
            else if (drug.priority === 'medium') priorityClass = 'priority-medium';

            let alertHTML = '';
            if (drug.critical) {
                alertHTML = `
                    <div class="drug-alert">
                        <span class="icon">⚠️</span>
                        <span><strong>Critical:</strong> ${drug.critical}</span>
                    </div>
                `;
            }

            let tableHTML = '';
            if (drug.table) {
                tableHTML = `
                    <table class="dose-table">
                        <thead>
                            <tr>
                                ${drug.table.headers.map(h => `<th>${h}</th>`).join('')}
                            </tr>
                        </thead>
                        <tbody>
                            ${drug.table.rows.map(row => `
                                <tr>
                                    ${row.map(cell => {
                                        const isCritical = cell.toLowerCase().includes('do not') || 
                                                         cell.toLowerCase().includes('critical') ||
                                                         cell.includes('⚠️');
                                        return `<td class="${isCritical ? 'critical-dose' : ''}">${cell}</td>`;
                                    }).join('')}
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;
            }

            let noteHTML = '';
            if (drug.note) {
                noteHTML = `<p class="text-small text-muted mt-4"><strong>Note:</strong> ${drug.note}</p>`;
            }

            let categoryHTML = '';
            if (drug.category) {
                categoryHTML = `<span class="drug-footer-item">📂 ${drug.category}</span>`;
            }

            card.innerHTML = `
                <div class="drug-header">
                    <div>
                        <div class="drug-name">${drug.name}</div>
                        <span class="drug-form">${drug.form}</span>
                    </div>
                    <span class="priority-badge ${priorityClass}">${drug.priority}</span>
                </div>
                <div class="drug-body">
                    <div class="drug-instruction">${drug.instruction}</div>
                    ${tableHTML}
                    ${noteHTML}
                    ${alertHTML}
                </div>
                <div class="drug-footer">
                    ${categoryHTML}
                    <span class="drug-footer-item">💊 ${drug.form}</span>
                </div>
            `;

            return card;
        }

        // Setup event listeners
        function setupEventListeners() {
            // Patient group switching
            document.querySelectorAll('[data-group]').forEach(button => {
                button.addEventListener('click', () => {
                    currentGroup = button.dataset.group;
                    currentCategory = null;
                    currentFilter = null;
                    
                    document.querySelectorAll('[data-group]').forEach(b => b.classList.remove('active'));
                    button.classList.add('active');
                    
                    mainTitle.textContent = `${currentGroup.charAt(0).toUpperCase() + currentGroup.slice(1)} Emergency Drugs`;
                    mainSubtitle.textContent = currentGroup === 'adults' 
                        ? "In-hours GP emergency bag medications. Reference: DTB 2015;53(5):56 & BNF"
                        : "In-hours GP emergency bag medications. Reference: DTB 2015;54(5):69 & BNF";
                    
                    renderCategories();
                    renderDrugs();
                });
            });

            // Filter buttons
            document.querySelectorAll('[data-filter]').forEach(button => {
                button.addEventListener('click', () => {
                    currentCategory = null;
                    currentFilter = button.dataset.filter;
                    renderCategories();
                    renderDrugs();
                });
            });

            // Search
            searchInput.addEventListener('input', renderDrugs);
        }

        // Initialize the app
        init();
    </script>
</body>
</html>
